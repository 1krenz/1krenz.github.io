<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portfolio</title>

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
            url('https://images.unsplash.com/photo-1497290756760-23ac55edf36f?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .nav-link {
            color: rgba(255,255,255,0.7);
            transition: 0.3s;
        }

        .nav-link:hover {
            color: white;
        }

        h1 {
            font-weight: 600;
            letter-spacing: 1px;
        }

        .btn-custom {
            border-radius: 30px;
            padding: 10px 25px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            background-color: white;
            color: black;
        }

        footer {
            font-size: 14px;
        }
    </style>
</head>

<body class="d-flex h-100 text-white text-center">

    <div class="container d-flex w-100 h-100 p-3 mx-auto flex-column justify-content-center align-items-center">

        <div class="glass">

            <!-- HEADER -->
            <header class="mb-4">
                <h3 class="mb-3">Portfolio de Ignacio Krenz</h3>
                <nav class="nav justify-content-center">
                    <a class="nav-link" href="index.html">Inicio</a>
                    <a class="nav-link" href="#">Acceso</a>
                    <a class="nav-link" href="#">Contacto</a>
                </nav>
            </header>

            <!-- MAIN -->
            <main>
                <h1>Bienvenido</h1>
                <p class="lead">
                    Este es mi portfolio personal donde muestro mis proyectos, diseños y trabajos.
                </p>

                <a href="blog.html" class="btn btn-light btn-custom fw-bold">
                    Ver Portfolio
                </a>
            </main>

            <!-- FOOTER -->
            <footer class="mt-4 text-white-50">
                <p>Hecho con Bootstrap 5</p>
            </footer>

        </div>

    </div>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
